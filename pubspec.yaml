name: maestro_ai
description: Maestro AI - مساعد شخصي ذكي يتحكم بالهاتف عبر الأوامر الصوتية
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Voice & Speech
  speech_to_text: ^6.6.2
  audio_waveforms: ^1.0.0
  flutter_tts: ^3.8.5
  
  # AI Model
  llama_cpp_dart: ^0.1.0
  
  # UI/Animations
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  dio: ^5.4.3+1
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Utilities
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  package_info_plus: ^6.0.0
  wakelock_plus: ^1.2.5
  connectivity_plus: ^6.0.5
  android_intent_plus: ^5.1.0
  
  # Other
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  share_plus: ^8.0.3
  url_launcher: ^6.2.6


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  
  assets:
    - assets/animations/
    - assets/icons/
  
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
